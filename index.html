<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THOS - Registro de Visitante</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast">Mensaje de alerta</div>

    <div id="contenedor-principal" class="contenedor">
        <h2>THOS - Nuevo Registro</h2>

        <form id="formulario-registro">
            <fieldset>
                <legend>Datos del Visitante</legend>
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" required>

                <label for="documento">Documento de Identidad</label>
                <input type="text" id="documento" required>

                <label for="telefono">Teléfono (10 dígitos)</label>
                <input type="tel" id="telefono" required>
            </fieldset>

            <fieldset>
                <legend>Detalles de la Visita</legend>
                <label for="paciente">Paciente a Visitar</label>
                <input type="text" id="paciente" required>

                <label for="area">Área de Destino</label>
                <input type="text" id="area" required>
            </fieldset>

            <button type="submit">Registrar Visita</button>
            <button type="button" onclick="abrirEscaner()" style="background-color: #11caa0; margin-top: 10px;">Abrir Escáner QR (Guardia)</button>
        </form>
    </div>

    <div id="contenedor-qr" class="qr-area" style="display: none;">
    <h3>Su Llave de Acceso (QR)</h3>
    <div id="codigo-qr"></div>
    <p>Presente este código en la entrada principal.</p>
    <button onclick="limpiarPantalla()">Nuevo Registro</button>
</div>

<div id="estacion-guardia" class="contenedor" style="display:none; margin-top: 20px;">
    <h3>Estación de Seguridad</h3>
    <div id="lector-qr" style="width: 100%; border-radius: 10px; overflow: hidden;"></div>
    
    <div id="resultado-escaneo" class="resultado-panel" style="display:none;">
        <p id="info-visitante"></p>
        <button id="btn-confirmar-ingreso" class="btn-success">Confirmar Ingreso</button>
    </div>
    
    <button onclick="volverAlMenu()" class="btn-secundario">Cerrar Escáner</button>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THOS - Total Hospital Security</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div id="toast">Mensaje de alerta</div>

    <div class="contenedor" id="modulo-registro">
        <h2>THOS - Recepción</h2>
        <form id="formulario-registro">
            <fieldset>
                <legend>Datos del Visitante</legend>
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" required>
                <label for="documento">Documento de Identidad</label>
                <input type="text" id="documento" required>
                <label for="telefono">Teléfono (10 dígitos)</label>
                <input type="tel" id="telefono" required>
            </fieldset>

            <fieldset>
                <legend>Detalles de la Visita</legend>
                <label for="buscar-paciente">Seleccionar Paciente (Catálogo):</label>
                <select id="buscar-paciente" onchange="UIController.seleccionarPaciente()" required>
                    <option value="">-- Seleccione un paciente --</option>
                </select>
                <label for="paciente">Paciente Seleccionado:</label>
                <input type="text" id="paciente" readonly required class="campo-bloqueado">
                <label for="area">Área de Destino:</label>
                <input type="text" id="area" readonly required class="campo-bloqueado">
            </fieldset>

            <button type="submit">Registrar y Generar Llave</button>
        </form>
        
        <div style="margin-top: 20px; border-top: 1px solid #cbd5e1; padding-top: 15px;">
            <button onclick="UIController.abrirEscaner()" class="btn-secundario"> Modo Guardia (Escáner)</button>
            <button onclick="UIController.abrirDashboard()" class="btn-secundario" style="margin-top: 10px; background-color: #0f172a;"> Panel de Monitoreo</button>
            <button onclick="UIController.abrirModuloReportes()" class="btn-secundario" style="margin-top: 10px; background-color: #475569;"> Descargar Reportes</button>
        </div>
    </div>

    <div class="contenedor qr-area" id="contenedor-qr" style="display: none;">
        <h3>Su Llave de Acceso (QR)</h3>
        <div id="codigo-qr"></div>
        <p>Presente este código al guardia de seguridad.</p>
        <button onclick="UIController.volverAlMenu('contenedor-qr')">Volver a Recepción</button>
    </div>

    <div class="contenedor" id="estacion-guardia" style="display:none;">
        <h3>Estación de Seguridad</h3>
        <div id="lector-qr" style="width: 100%;"></div>
        <div id="resultado-escaneo" class="resultado-panel" style="display:none;">
            <p id="info-visitante"></p>
            <p id="timestamp-confirmacion" class="texto-timestamp"></p>
            <button id="btn-confirmar-ingreso" class="btn-success">Confirmar Ingreso</button>
        </div>
        <button onclick="UIController.volverAlMenu('estacion-guardia')" class="btn-secundario" style="margin-top: 20px;">Cerrar Escáner</button>
    </div>

    <div class="contenedor" id="modulo-dashboard" style="display:none; max-width: 800px;">
        <h2>Visitantes Activos</h2>
        <div class="buscador-container">
            <input type="text" id="filtro-area" placeholder="Filtrar por Área..." onkeyup="UIController.renderizarTablaActivos()">
        </div>
        <div style="overflow-x: auto;">
            <table class="tabla-telemetria">
                <thead><tr><th>ID Visita</th><th>Visitante</th><th>Área</th><th>Ingreso</th><th>Tiempo</th></tr></thead>
                <tbody id="cuerpo-tabla-activos"></tbody>
            </table>
        </div>
        <button onclick="UIController.volverAlMenu('modulo-dashboard')" class="btn-secundario" style="margin-top: 20px;">Volver al Menú</button>
    </div>

    <div class="contenedor" id="modulo-reportes" style="display:none;">
        <h2>Exportar Historial</h2>
        <fieldset>
            <legend>Filtros del Escáner</legend>
            <label for="filtro-estado-reporte">Estado de la Visita:</label>
            <select id="filtro-estado-reporte" style="width: 100%; padding: 10px; margin-bottom: 15px;">
                <option value="TODOS">Todos los registros</option>
                <option value="Dentro del Hospital">Activos</option>
                <option value="Registrado">Pendientes de Ingreso</option>
            </select>
        </fieldset>
        <button onclick="UIController.generarReporteCSV()" class="btn-success">Descargar Reporte</button>
        <button onclick="UIController.volverAlMenu('modulo-reportes')" class="btn-secundario" style="margin-top: 15px;">Volver al Menú</button>
    </div>

    <script src="models.js"></script>
    <script src="service.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
